name: SoulEnchants
version: 1.1.0
main: com.soulenchants.SoulEnchants
api-version: 1.8
author: built-via-claude
description: Custom enchantments with Souls currency, books, dust, scrolls, mythic weapons and cosmetic masks.
softdepend: [ProtocolLib, Apollo, LunarClient-API, LunarAPI]

commands:
  souls:
    description: View or manage your Souls balance and tier
    usage: §8/§esouls §7[show|tier|rules|give|take|set|settier]
    aliases: [bal, soul]
  ce:
    description: SoulEnchants admin hub — books, dust, scrolls, bosses, reload
    usage: §8/§ece §7<list|menu|god|reload|book|dust|scroll|summon|despawn|loot>
    aliases: [customenchants]
  bless:
    description: Cleanse all negative potion effects from a player
    usage: §8/§ebless §7[player]
    aliases: [cleanse]
  boss:
    description: Boss control (list / kill)
    usage: §8/§eboss §7<list|kill>
    aliases: [bosses]
  shop:
    description: Open the Quartermaster shop
    usage: §8/§eshop §7[refresh]
    aliases: [quartermaster]
  quests:
    description: Open the quest log (active / completed / claimable)
    usage: §8/§equests §7[status|reset]
    aliases: [quest]
  mob:
    description: Custom mob registry, spawn control, cleanup
    usage: §8/§emob §7<list|spawn|killall>
    aliases: [mobs]
  rift:
    description: Travel between the main world and the Void Rift
    usage: §8/§erift §7[tp|setspawn|loadchunks]
    aliases: [riftworld]
  lootfilter:
    description: Per-player blacklist for custom mob drops
    usage: §8/§elootfilter §7[togglemessage]
    aliases: [lootft, lootfilters, ftloot]
  guild:
    description: Guild — 10 players max, friendly-fire blocked, shared vault
    usage: §8/§eguild §7<create|invite|join|leave|disband|vault|info|top|ping>
    aliases: [guilds, g]
  modock:
    description: Modock — King of Atlantis (three-phase rift boss)
    usage: §8/§emodock §7<status|spawns|give|summon|abort|setspawn|tp>
    aliases: [atlantis]
  mythic:
    description: Mythic weapons — 9 named gear items with unique effects
    usage: §8/§emythic §7<list|give §8<§7id§8> §7[player]>
    aliases: [mw]
  mask:
    description: Cosmetic masks — client-side helmet overrides (ProtocolLib)
    usage: §8/§emask §7<list|equip §8<§7id§8>|clear>
    aliases: [masks]
  lunar:
    description: Lunar Client API bridge — diagnostic + cooldown test
    usage: §8/§elunar §7<status|test>
    aliases: []

permissions:
  soulenchants.admin:
    description: Administrate — /ce book/dust/scroll/reload, /mythic give, etc.
    default: op
  soulenchants.use:
    description: Baseline — receive enchant procs, mythic effects, etc.
    default: true
  soulenchants.mythic.use:
    description: Wield mythic weapons
    default: true
  soulenchants.mask.use:
    description: Equip cosmetic masks via /mask
    default: true
