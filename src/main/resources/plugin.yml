name: SoulEnchants
version: 1.0.0-MVP
main: com.soulenchants.SoulEnchants
api-version: 1.8
author: built-via-claude
description: Custom enchantments with Souls currency, books, dust, and scrolls.

commands:
  souls:
    description: Check or modify your Souls balance
    usage: /souls [give|take|set] [player] [amount]
    aliases: [bal, soul]
  ce:
    description: Custom Enchants admin/utility
    usage: /ce <give|book|dust|scroll|list>
    aliases: [customenchants]
  bless:
    description: Remove all negative potion effects from a player
    usage: /bless [player]
    aliases: [cleanse]
  boss:
    description: Boss control (list/kill)
    usage: /boss <list|kill>
    aliases: [bosses]
  shop:
    description: Open the Quartermaster shop
    usage: /shop [refresh]
    aliases: [quartermaster]
  quests:
    description: Open the quest log
    usage: /quests [status|reset]
    aliases: [quest]
  mob:
    description: Custom mob registry / spawn
    usage: /mob <list|spawn|killall>
    aliases: [mobs]
  rift:
    description: Toggle travel between main world and rift_world
    usage: /rift [tp|setspawn]
    aliases: [riftworld]
  lootfilter:
    description: Per-player blacklist for custom mob drops
    usage: /lootfilter [togglemessage]
    aliases: [lootft, lootfilters, ftloot]
  guild:
    description: Guild management (max 10 players, friendly-fire blocked)
    usage: /guild <create|invite|join|leave|disband|vault|info|top>
    aliases: [guilds, g]
  modock:
    description: Modock — King of Atlantis (3-phase rift boss)
    usage: /modock <status|give|summon|abort|setspawn|tp>
    aliases: [atlantis]

permissions:
  soulenchants.admin:
    description: Admin permission
    default: op
  soulenchants.use:
    description: Use enchants normally
    default: true
